services:
  nginx:
    container_name: rob-portfolio-nginx
    image: nginx:alpine
    restart: unless-stopped

    ports:
      - "8081:80"

    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3