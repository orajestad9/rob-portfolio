# Nginx serves the static Astro build from the dist/ directory mounted by Docker.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Fall back to index.html so client-side-style paths resolve cleanly.
        try_files $uri $uri/ $uri/index.html /index.html;
    }
}
